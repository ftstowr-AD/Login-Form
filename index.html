<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="login form">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="favicon_io (AD)\favicon.ico" type="image/x-icon">
    <title>Login Form</title>
</head>

<body>


    <form action="#">
        <div class="container innerbox">
            <h2>Login</h2>
            <label for="username-email">Username or Email</label>
            <input type="text" id="username-email" name="username-email" required>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>

            <div class="options">

                <label class="remember-me">
                    <input type="checkbox" name="remember-me">
                    <span>Remember me</span>
                </label>


                <a href="#">Forgot password?</a>
            </div>

            <button type="submit">Login</button>

        </div>

    </form>



</body>

</html>
